name: ROS 2 Build & Test

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
  workflow_dispatch:

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy
    defaults:
      run:
        working-directory: ros2
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          apt-get update -qq
          apt-get install -y python3-colcon-common-extensions python3-pytest >/dev/null

      - name: rosdep
        run: |
          rosdep update 2>/dev/null || (rosdep init && rosdep update)
          rosdep install --from-paths src --ignore-src -y || true

      - name: colcon build
        run: |
          . /opt/ros/jazzy/setup.sh
          colcon build --packages-select lsep_msgs lsep_ros2

      - name: Unit tests (9/9 expected)
        run: |
          . /opt/ros/jazzy/setup.sh
          . install/setup.sh
          python3 -m pytest src/lsep_ros2/test/test_engine.py -v

      - name: Headless smoke test (state ladder)
        run: |
          . /opt/ros/jazzy/setup.sh
          . install/setup.sh
          ros2 launch lsep_ros2 lsep_demo.launch.py > /tmp/launch.log 2>&1 &
          sleep 8
          ( timeout 32 ros2 topic echo /lsep/signal --field state_name \
            || timeout 32 ros2 topic echo /lsep/signal | grep -a state_name ) \
            > /tmp/states.log 2>/dev/null || true
          echo "=== UNIQUE STATES OBSERVED ==="
          sort -u /tmp/states.log
          echo "=== LAUNCH LOG TAIL ==="
          tail -n 20 /tmp/launch.log
          # Fail if the ladder never reached THREAT
          grep -qa THREAT /tmp/states.log || { echo "THREAT never observed"; exit 1; }
